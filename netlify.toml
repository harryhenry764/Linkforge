[build]
  command = "pip install -r requirements.txt"
  publish = "static"
  functions = "netlify/functions"

[functions]
  external_node_modules = []
  node_bundler = "none"

# All non‑static requests go to the FastAPI function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200
  force = false
